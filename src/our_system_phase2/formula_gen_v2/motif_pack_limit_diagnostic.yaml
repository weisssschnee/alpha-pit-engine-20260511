schema_version: limit_motif_pack_diagnostic_v1
status: diagnostic_only_not_official_budget
objective: >
  Test whether limit-state variables are useful as event factors,
  interaction factors, or R3 in-regime secondary gates without changing
  the locked X0/R3 shadow object.

field_families:
  limit_event:
    - "$limit_up_event"
    - "$limit_down_event"
    - "$limit_up_break"
    - "$limit_flip_up_to_down"
    - "$limit_flip_down_to_up"
  limit_streak:
    - "$limit_up_streak"
    - "$limit_down_streak"
  price:
    - "$close"
    - "$open"
    - "$vwap"
  flow:
    - "$amount"
    - "$volume"
    - "$turnover_rate"
  volatility:
    - "$ret"

windows:
  micro: [2, 3, 5]
  short: [8, 10, 20]

roles:
  event_factor:
    templates:
      - "CSRank(Mean({limit_event},{w1}))"
      - "CSRank(Mean({limit_streak},{w1}))"
      - "CSRank(Sub(Mean({limit_event},{w1}),Mean({limit_event},{w2})))"
  interaction_factor:
    templates:
      - "CSRank(Mul(ZScore(Mean(Abs(Delta({price},1)),{w2})),ZScore(Mean({limit_event},{w1}))))"
      - "CSRank(Mul(ZScore(Mean({flow},{w2})),ZScore(Mean({limit_event},{w1}))))"
      - "CSRank(CSResidual(ZScore(Mean({limit_event},{w1})),CSRank(Log($final_float_market_cap))))"
  r3_secondary_gate_diagnostic:
    templates:
      - "R3_liquidity_low AND limit_density_high"
      - "R3_liquidity_low AND limit_density_not_high"
      - "R3_liquidity_low AND limit_density_low"

constraints:
  direct_mainline_budget: 0
  official_book_eligible: false
  same_day_limit_status_allowed: false
  required_feature_lag_days: 1
  execution_boundary: "signal_t_execute_t_plus_1"
  mandatory_audits:
    - gate_lag_check
    - tradability_exclusion_check
    - same_day_leakage_check
    - R3_interaction_2x2
