schema_version: formula_gen_v2_motif_pack_v1

windows:
  micro: [2, 3, 5]
  short: [10, 20]
  medium: [40, 60]
  long: [120]

field_families:
  price: ["$close", "$vwap"]
  flow: ["$amount", "$volume", "$turnover_rate"]
  volatility: ["$ret"]
  return: ["$ret"]

complexity_tier_weights:
  1: 0.20
  2: 0.35
  3: 0.30
  4: 0.15

role_templates:
  B:
    price_momentum:
      field_families: ["price"]
      templates:
        - "ZScore(Mom({price},{w1}))"
        - "ZScore(Sub(Mom({price},{w1}),Mom({price},{w2})))"
        - "ZScore(Mean(Delta({price},1),{w1}))"
    liquidity_acceleration:
      field_families: ["flow"]
      has_second_difference: true
      templates:
        - "ZScore(Sub(Delta({flow},1),Delay(Delta({flow},1),1)))"
        - "ZScore(Mean(Abs(Delta({flow},1)),{w1}))"
    signed_nonlinear_magnitude:
      field_families: ["flow", "price"]
      has_signed_nonlinear: true
      templates:
        - "Mul(Sign(ZScore(Delta({flow},1))),Mul(ZScore(Delta({flow},1)),ZScore(Delta({flow},1))))"
        - "Mul(Sign(ZScore(Mom({price},{w1}))),Mul(ZScore(Mom({price},{w1})),ZScore(Mom({price},{w1}))))"
  C:
    delta_autocorr:
      field_families: ["flow"]
      has_temporal_autoregression: true
      templates:
        - "Corr(Delta({flow},1),Delay(Delta({flow},1),1),{w1})"
    delta_persistence:
      field_families: ["flow"]
      has_temporal_autoregression: true
      templates:
        - "Mean(Mul(Sign(Delta({flow},1)),Sign(Delay(Delta({flow},1),1))),{w1})"
    price_volume_confirmation:
      field_families: ["price", "flow"]
      templates:
        - "Mean(Mul(Sign(Delta({price},1)),Sign(Delta({flow},1))),{w1})"
  S:
    volatility_state:
      field_families: ["price"]
      templates:
        - "ZScore(Mean(Abs(Delta({price},1)),{w2}))"
    liquidity_state:
      field_families: ["flow"]
      templates:
        - "Sub(ZScore(Mean({flow},{w1})),ZScore(Mean({flow},{w2})))"
        - "ZScore(Mean(Abs(Delta({flow},1)),{w1}))"

compose_motifs:
  base_only:
    roles: ["B"]
    complexity_tier: 1
    templates: ["{B}"]
  signal_confirm:
    roles: ["B", "C"]
    complexity_tier: 2
    templates: ["Mul({B},{C})"]
  signal_state:
    roles: ["B", "S"]
    complexity_tier: 2
    templates: ["Mul({B},{S})"]
  signal_confirm_state:
    roles: ["B", "C", "S"]
    complexity_tier: 3
    templates: ["Mul({B},Mul({C},{S}))"]
  nonlinear_magnitude:
    roles: ["B"]
    require_base_family: ["signed_nonlinear_magnitude"]
    complexity_tier: 4
    templates: ["{B}"]
  temporal_confirmation:
    roles: ["B", "C"]
    require_confirm_family: ["delta_autocorr", "delta_persistence"]
    complexity_tier: 4
    templates: ["Mul({B},{C})"]

wrappers:
  - "CSRank({x})"
  - "CSRank(ZScore({x}))"

constraints:
  max_roles: 3
  max_raw_field_families: 3
  max_tree_depth: 8
  max_product_arity: 3
  max_temporal_ops: 4
  max_corr_ops: 1
  max_signed_square_ops: 1
  no_nested_corr: true
  no_nested_signed_square: true
  all_product_inputs_must_be_normalized_or_sign_bounded: true

seed_templates:
  - {id: T01, expression: "Mul(ZScore(Mom($close,5)),Sign(Delta($amount,1)))"}
  - {id: T02, expression: "Mul(ZScore(Mom($close,10)),Sign(Delta($volume,1)))"}
  - {id: T03, expression: "Mul(ZScore(Sub(Mom($close,5),Mom($close,20))),Sign(Delta($amount,1)))"}
  - {id: T04, expression: "Mul(ZScore(Mom($close,5)),Mean(Mul(Sign(Delta($amount,1)),Sign(Delta($close,1))),5))"}
  - {id: T05, expression: "Mul(ZScore(Mom($close,10)),Mean(Mul(Sign(Delta($volume,1)),Sign(Delta($close,1))),10))"}
  - {id: T06, expression: "Mul(ZScore(Mom($close,5)),Corr(Delta($amount,1),Delay(Delta($amount,1),1),10))"}
  - {id: T07, expression: "Mul(ZScore(Mom($vwap,5)),Corr(Delta($volume,1),Delay(Delta($volume,1),1),10))"}
  - {id: T08, expression: "Mul(ZScore(Sub(Mom($close,5),Mom($close,20))),Corr(Delta($amount,1),Delay(Delta($amount,1),1),20))"}
  - {id: T09, expression: "Mul(ZScore(Sub(Delta($amount,1),Delay(Delta($amount,1),1))),Sign(Delta($close,1)))"}
  - {id: T10, expression: "Mul(ZScore(Sub(Delta($volume,1),Delay(Delta($volume,1),1))),Sign(Delta($close,1)))"}
  - {id: T11, expression: "Mul(ZScore(Mom($close,5)),ZScore(Sub(Delta($amount,1),Delay(Delta($amount,1),1))))"}
  - {id: T12, expression: "Mul(ZScore(Mom($vwap,5)),ZScore(Sub(Delta($volume,1),Delay(Delta($volume,1),1))))"}
  - {id: T13, expression: "Mul(Sign(ZScore(Delta($amount,1))),Mul(ZScore(Delta($amount,1)),ZScore(Delta($amount,1))))"}
  - {id: T14, expression: "Mul(Sign(ZScore(Delta($volume,1))),Mul(ZScore(Delta($volume,1)),ZScore(Delta($volume,1))))"}
  - {id: T15, expression: "Mul(ZScore(Mom($close,5)),Mul(Sign(Delta($amount,1)),Sign(Delta($close,1))))"}
  - {id: T16, expression: "Mul(ZScore(Mom($close,10)),Mul(Sign(Delta($volume,1)),Sign(Delta($close,1))))"}
  - {id: T17, expression: "Mul(ZScore(Mom($close,5)),Mul(Corr(Delta($amount,1),Delay(Delta($amount,1),1),10),ZScore(Mean(Abs(Delta($close,1)),20))))"}
  - {id: T18, expression: "Mul(ZScore(Sub(Mom($close,5),Mom($close,20))),Mul(Sign(Delta($amount,1)),ZScore(Mean(Abs(Delta($close,1)),20))))"}
  - {id: T19, expression: "Mul(ZScore(Mom($vwap,5)),Mul(Mean(Mul(Sign(Delta($amount,1)),Sign(Delta($close,1))),5),ZScore(Mean(Abs(Delta($close,1)),20))))"}
  - {id: T20, expression: "Mul(ZScore(Sub(Delta($amount,1),Delay(Delta($amount,1),1))),Mul(Sign(Delta($close,1)),ZScore(Mean(Abs(Delta($close,1)),20))))"}

